{% set name = "mdformat-pyproject" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mdformat_pyproject-{{ version }}.tar.gz
  sha256: e81eb9d5c25d419cc6745d6deb260d85ab03566a7570c0d99f70255883a99cd8

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - flit-core >=3.2,<4
    - pip
  run:
    - python >={{ python_min }}
    - mdformat >=0.7,<1
    # for all python to stay noarch: python
    - tomli >=2.0,<3

test:
  imports:
    - mdformat_pyproject
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: An mdformat plugin to read configuration from pyproject.toml
  home: https://pypi.org/project/mdformat-pyproject/
  dev_url: https://github.com/csala/mdformat-pyproject
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - anjos
